name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to release (e.g. v11.0.0)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Validate input tag exists
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ inputs.tag }}"
          if ! [[ "$TAG" =~ ^v.* ]]; then
            echo "Error: input tag '$TAG' is invalid. It must start with 'v' (e.g. v11.0.0)."
            exit 1
          fi

          REPO_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          echo "Validating that tag '$TAG' exists in '$REPO_URL'..."
          if ! git ls-remote --exit-code --tags "$REPO_URL" "refs/tags/$TAG" > /dev/null 2>&1; then
            echo "Error: tag '$TAG' does not exist in the remote repository."
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test-no-ui

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches manifest version
        run: |
          TAG_VERSION="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#refs/tags/}"
          TAG_VERSION="${TAG_VERSION#v}"
          MANIFEST_VERSION="${{ steps.version.outputs.version }}"
          echo "Tag version: ${TAG_VERSION}"
          echo "Manifest version: ${MANIFEST_VERSION}"
          if [ "${TAG_VERSION}" != "${MANIFEST_VERSION}" ]; then
            echo "Error: Git tag version (${TAG_VERSION}) does not match manifest.json version (${MANIFEST_VERSION})."
            exit 1
          fi

      - name: Build production release
        run: npx webpack --mode=production --env RELEASE=stable

      - name: Create archives
        run: |
          cd build-release
          tar -czf "../DemoMonkey-${{ steps.version.outputs.version }}-stable.tar.gz" .
          cd ..
          rm -r build-release

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.4.0
        with:
          name: release-artifacts
          path: |
            DemoMonkey-${{ steps.version.outputs.version }}-stable.zip
            DemoMonkey-${{ steps.version.outputs.version }}-stable.tar.gz
          retention-days: 5

  attest:
    name: Attest build provenance
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      attestations: write
    env:
      ARTIFACT_BASENAME: DemoMonkey-${{ needs.build.outputs.version }}-stable
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts

      - name: Attest zip
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ env.ARTIFACT_BASENAME }}.zip

      - name: Attest tarball
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ env.ARTIFACT_BASENAME }}.tar.gz
  release:
    name: Create GitHub release
    needs: [build, attest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ARTIFACT_BASENAME: DemoMonkey-${{ needs.build.outputs.version }}-stable
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            "${ARTIFACT_BASENAME}.zip" \
            "${ARTIFACT_BASENAME}.tar.gz"
