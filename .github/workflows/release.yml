name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to release (e.g. v11.0.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test-no-ui

      - name: Extract version
        id: version
        run: echo "version=$(node -p \"require('./manifest.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches manifest version
        run: |
          TAG_VERSION="${{ inputs.tag }}"
          TAG_VERSION="${TAG_VERSION#v}"
          MANIFEST_VERSION="${{ steps.version.outputs.version }}"
          echo "Tag version: ${TAG_VERSION}"
          echo "Manifest version: ${MANIFEST_VERSION}"
          if [ "${TAG_VERSION}" != "${MANIFEST_VERSION}" ]; then
            echo "Error: Git tag version (${TAG_VERSION}) does not match manifest.json version (${MANIFEST_VERSION})."
            exit 1
          fi

      - name: Build production release
        run: npx webpack --mode=production --env RELEASE=stable

      - name: Create archives
        run: |
          cd build-release
          tar -czf "../DemoMonkey-${{ steps.version.outputs.version }}-stable.tar.gz" .
          cd ..
          rm -r build-release

      - name: Upload artifacts
        uses: actions/upload-artifact@84480863f228bb9747b473957fcc9e309aa96097 # v4.4.0
        with:
          name: release-artifacts
          path: |
            DemoMonkey-${{ steps.version.outputs.version }}-stable.zip
            DemoMonkey-${{ steps.version.outputs.version }}-stable.tar.gz
          retention-days: 5

  attest:
    name: Attest build provenance
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      attestations: write
    env:
      ARTIFACT_BASENAME: DemoMonkey-${{ needs.build.outputs.version }}-stable
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-artifacts

      - name: Attest zip
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669fd # v2.3.0
        with:
          subject-path: ${{ env.ARTIFACT_BASENAME }}.zip

      - name: Attest tarball
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669fd # v2.3.0
        with:
          subject-path: ${{ env.ARTIFACT_BASENAME }}.tar.gz
  release:
    name: Create GitHub release
    needs: [build, attest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ARTIFACT_BASENAME: DemoMonkey-${{ needs.build.outputs.version }}-stable
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            "${ARTIFACT_BASENAME}.zip" \
            "${ARTIFACT_BASENAME}.tar.gz"
